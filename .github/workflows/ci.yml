name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Install maturin
        run: pip install maturin pytest pytest-asyncio httpx psutil pyyaml rich typer fastapi uvicorn pydantic

      - name: Build extension
        run: maturin develop --release
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Verify CLIs and Hawkeye pack
        run: |
          scout --help >/dev/null
          hawkeye --help >/dev/null
          python -c "from scout.hawkeye.config import _read_pack_yaml; r=_read_pack_yaml('rules.yaml').get('rules') or []; assert r, 'empty hawkeye pack'"

      - name: Run tests
        run: pytest -q

  # Fail on CRITICAL/HIGH Python dependency CVEs (pip-audit advisory DB).
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and pip-audit
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -q -U pip pip-audit
          pip install -q -e .

      - name: pip-audit (fail on high/critical)
        run: |
          source .venv/bin/activate
          pip-audit --min-severity high

      - name: npm audit when package-lock.json exists
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high
          else
            echo "No package-lock.json — skipping npm audit"
          fi

  hawkeye-binary:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build hawkeye binary
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -q -U pip pyinstaller httpx pyyaml
          pip install -q -e .
          pyinstaller packaging/hawkeye.spec --clean --noconfirm

      - name: Smoke test binary
        shell: bash
        run: |
          BIN="dist/hawkeye"
          [[ -x "$BIN" ]] || BIN="dist/hawkeye.exe"
          "$BIN" --help >/dev/null
          WORK=$(mktemp -d)
          echo 'x = 1' > "$WORK/main.py"
          "$BIN" review --backend filesystem --file "$WORK/main.py" --project-root "$WORK" >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: hawkeye-${{ matrix.os }}
          path: dist/hawkeye*

  wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/
